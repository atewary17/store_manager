# docker-compose.yml
# For local development and testing Docker setup before deploying to server
# Usage: docker compose up

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: store_manager
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: store_manager_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"   # remove in production — only expose internally

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Rails Web ─────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://store_manager:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/store_manager_production
      REDIS_URL: redis://redis:6379/0
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_TO_STDOUT: "true"
      DISABLE_PREPARED_STATEMENTS: "true"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      API_JWT_SECRET: ${API_JWT_SECRET}
    ports:
      - "3000:3000"
    volumes:
      - storage_data:/app/storage   # ActiveStorage uploads
    command: >
      sh -c "
        bundle exec rails db:migrate &&
        bundle exec rails db:seed &&
        bundle exec puma -C config/puma.rb
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── GoodJob (background jobs) ─────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://store_manager:${POSTGRES_PASSWORD:-changeme_in_production}@db:5432/store_manager_production
      REDIS_URL: redis://redis:6379/0
      RAILS_LOG_TO_STDOUT: "true"
      DISABLE_PREPARED_STATEMENTS: "true"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    command: bundle exec good_job start

volumes:
  postgres_data:
  redis_data:
  storage_data:
